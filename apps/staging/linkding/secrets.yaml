apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kv-tunnel-secrets
  namespace: linkding
spec:
  provider: azure

  paramaters:
    keyvaultName: kv-homelab-test

    objects: |
      array:
        - |
          objectName: cloudflare-tunnel-creds
          objectType: secret
          objectAlias: credentials.json
    tenantID: "f96fa795-2bcd-4282-b567-572483106349"
  nodePublishSecretRef:
    name: secrets-store-creds
